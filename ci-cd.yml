name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mosque-platform

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint & Type-check ──────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run lint type-check --parallel

  lint-python:
    name: Lint Python (scraper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - working-directory: apps/scraper
        run: |
          pip install ruff black mypy isort
          ruff check src/
          black --check src/
          isort --check-only src/
          mypy src/

  # ── Tests ──────────────────────────────────────────────────
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: mosque_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        working-directory: apps/backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_DB: mosque_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          REDIS_HOST: localhost
          JWT_SECRET: test_secret_at_least_32_chars_long_here
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test --filter=frontend

  test-scraper:
    name: Test scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - working-directory: apps/scraper
        run: |
          pip install ".[dev]"
          pytest tests/ --cov=src --cov-report=xml -q
        env:
          OPENAI_API_KEY: test_key
          POSTGRES_PASSWORD: test
          KAFKA_BROKERS: localhost:9092

  # ── Build Docker images ────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [lint, lint-python, test-backend, test-frontend, test-scraper]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [frontend, backend, scraper]
        include:
          - service: frontend
            dockerfile: apps/frontend/Dockerfile
            context: .
          - service: backend
            dockerfile: apps/backend/Dockerfile
            context: .
          - service: scraper
            dockerfile: apps/scraper/Dockerfile
            context: apps/scraper
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ── Deploy to production ───────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/mosque-platform
            git pull origin main
            export VERSION=sha-${{ github.sha }}
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --no-build
            docker system prune -f
            echo "Deployed $VERSION at $(date)"
