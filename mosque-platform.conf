# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
  listen 80;
  server_name _;
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS main server ────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name mosque-platform.com www.mosque-platform.com;

  ssl_certificate     /etc/letsencrypt/live/mosque-platform.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mosque-platform.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  client_max_body_size 10M;

  # ── API routes → backend ────────────────────────────────
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    limit_conn conn 20;

    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID $request_id;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    # CORS preflight
    if ($request_method = 'OPTIONS') {
      add_header Access-Control-Allow-Origin  $http_origin;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID";
      add_header Access-Control-Max-Age       3600;
      return 204;
    }
  }

  # ── Static assets → long-cache ─────────────────────────
  location /_next/static/ {
    proxy_pass http://frontend;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ── Frontend → Next.js ──────────────────────────────────
  location / {
    limit_req zone=general burst=50 nodelay;

    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
